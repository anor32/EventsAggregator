[tool.black]
line-length = 79
extend-exclude = '''
\.venv/
| tests/
| __pycache__/
| migrations/
| build/
| dist/
'''

[tool.isort]
profile = "black"
line_length = 79
include_trailing_comma = true
skip = ["__init__.py"]
skip_glob = [".venv/*", "tests/*", "migrations/*", "build/*", "dist/*",]

[tool.flake8]
max-line-length = 79
count = true
exclude = [".git", "__pycache__", ".venv", "tests", "migrations", "build", "dist",'alembic/*']
extend-ignore = ["E203", "E266", "W503"]
per-file-ignores = [
    "__init__.py: F401, E402",
    "*/migrations/*: ALL"
]